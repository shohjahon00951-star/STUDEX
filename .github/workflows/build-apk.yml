name: Build Studex APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Repozitoriyni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Tizim kutubxonalarini o'rnatish
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev \
            automake build-essential

      - name: Buildozer o'rnatish
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython==0.29.33 virtualenv

      - name: APK yig'ish
        run: |
          yes | buildozer android debug

      - name: Tayyor APK'ni yuklash (Artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: studex-apk
          path: bin/*.apk
